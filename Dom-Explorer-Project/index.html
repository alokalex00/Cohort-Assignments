<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

  <div class="container">
    <div class="top">
      <h1><i class="ri-task-line"></i> Task Management System</h1>
      <button id="themeBtn"><i class="ri-moon-line"></i></button>
    </div>

    <div class="cards">
      <div class="card blue"><i class="ri-file-list-line"></i><div><p>Total Tasks</p><h2 id="totalCount">0</h2></div></div>
      <div class="card yellow"><i class="ri-time-line"></i><div><p>Pending Tasks</p><h2 id="pendingCount">0</h2></div></div>
      <div class="card green"><i class="ri-checkbox-circle-line"></i><div><p>Completed Tasks</p><h2 id="completedCount">0</h2></div></div>
    </div>

    <div class="progressBox">
      <p>Progress: <span id="progressText">0%</span></p>
      <div class="progress">
        <div id="progressBar"></div>
      </div>
    </div>

    <div class="taskBox">
      <div class="taskTop">
        <h3><i class="ri-menu-line"></i> My Tasks</h3>
        <button id="addBtn">+ Add</button>
        <input type="text" id="searchInput" placeholder="Search task...">
        <select id="filter">
          <option value="all">All</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <div id="taskList"></div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modalBox">
      <input type="text" id="taskInput" placeholder="Enter task">

      <div class="radioBox">
        <label><input type="radio" name="level" value="easy" checked> Easy</label>
        <label><input type="radio" name="level" value="medium"> Medium</label>
        <label><input type="radio" name="level" value="hard"> Hard</label>
      </div>

      <div class="modalBtns">
        <button id="createBtn">Create</button>
        <button id="closeBtn">Close</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
